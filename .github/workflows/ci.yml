name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deploy is handled locally via ./deploy.sh (requires Tailscale)

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_DEV_MODE: "true"
  DATABASE_URL: "file:./dev.db"
  NEXTAUTH_SECRET: "ci-test-secret-not-for-production"

jobs:
  # ── Quality gates (parallel) ──────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── Build ─────────────────────────────────────────────────
  build:
    name: Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Push schema & seed DB for tests
        run: |
          npx prisma db push --accept-data-loss
          npm run db:seed
      - name: Build Next.js
        run: npm run build
      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/standalone/ 2>/dev/null || echo "standalone not available"
          find .next/static -name '*.js' -exec du -sh {} + 2>/dev/null | sort -rh | head -10
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Fail if total JS bundle exceeds 2MB
          TOTAL_JS=$(find .next/static -name '*.js' -exec cat {} + 2>/dev/null | wc -c)
          TOTAL_MB=$((TOTAL_JS / 1024 / 1024))
          echo "Total JS: ${TOTAL_MB}MB"
          if [ "$TOTAL_MB" -gt 2 ]; then
            echo "::warning::JS bundle exceeds 2MB budget (${TOTAL_MB}MB)"
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── E2E tests ─────────────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Push schema & seed DB
        run: |
          npx prisma db push --accept-data-loss
          npm run db:seed
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start server & run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000/api/health --timeout 30000
          npx playwright test --project=chromium
        env:
          PORT: "3000"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ── Deploy to EC2 (manual trigger only) ──────────────────
  deploy:
    name: Deploy to EC2
    needs: e2e
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Deploy
        run: |
          EC2_USER="${{ vars.EC2_USER }}"
          EC2_HOST="${{ vars.EC2_HOST }}"
          APP_DIR="${{ vars.APP_DIR }}"
          SITE_DOMAIN="${{ vars.SITE_DOMAIN }}"
          GIT_COMMIT="${{ github.sha }}"

          echo "Deploying $GIT_COMMIT to $SITE_DOMAIN..."

          # Pre-deploy backup
          ssh $EC2_USER@$EC2_HOST "
            mkdir -p $APP_DIR/backups &&
            sqlite3 $APP_DIR/prisma/dev.db '.backup $APP_DIR/backups/pre-deploy-ci-$(date +%Y%m%d-%H%M%S).db' 2>/dev/null || true
          "

          # Preserve previous build
          ssh $EC2_USER@$EC2_HOST "
            cd $APP_DIR &&
            rm -rf .next-previous &&
            cp -r .next .next-previous 2>/dev/null || true
          "

          # Sync files
          sudo apt-get update -qq && sudo apt-get install -y -qq rsync > /dev/null
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude '.next' \
            --exclude '.next-previous' --exclude '.env.local' \
            --exclude 'prisma/dev.db' --exclude 'prisma/dev.db-journal' \
            --exclude 'backups' --exclude 'e2e/test-results' \
            --exclude 'e2e/playwright-report' --exclude '.DS_Store' \
            ./ $EC2_USER@$EC2_HOST:$APP_DIR/

          # Build and restart
          ssh $EC2_USER@$EC2_HOST "
            cd $APP_DIR &&
            npm ci --production=false 2>&1 | tail -3 &&
            DATABASE_URL='file:$APP_DIR/prisma/dev.db' npx prisma db push --accept-data-loss 2>&1 | tail -3 &&
            GIT_COMMIT='$GIT_COMMIT' npm run build 2>&1 | tail -5 &&
            cp -r public .next/standalone/public 2>/dev/null || true &&
            cp -r .next/static .next/standalone/.next/static &&
            cp -r glossary .next/standalone/glossary &&
            cp -r prisma .next/standalone/prisma &&
            ln -sf $APP_DIR/prisma/dev.db .next/standalone/prisma/dev.db 2>/dev/null || true &&
            cp -r node_modules/.prisma .next/standalone/node_modules/.prisma 2>/dev/null || true &&
            cp -r node_modules/@prisma .next/standalone/node_modules/@prisma 2>/dev/null || true &&
            sudo systemctl set-environment GIT_COMMIT='$GIT_COMMIT' 2>/dev/null || true &&
            sudo systemctl restart insighthub
          "

          # Health check with retry
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "https://$SITE_DOMAIN/api/health" > /dev/null; then
              echo "✅ Health check passed (attempt $i)"
              echo "Deployed: https://$SITE_DOMAIN"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

          # Auto-rollback on failure
          echo "❌ Health check failed — rolling back..."
          ssh $EC2_USER@$EC2_HOST "
            cd $APP_DIR &&
            if [ -d .next-previous ]; then
              rm -rf .next && mv .next-previous .next &&
              sudo systemctl restart insighthub
            fi
          "
          exit 1
