# InsightHub — TLS hardening include
#
# Purpose: Pin TLS protocols, ciphers, and stapling to the Mozilla "intermediate"
# baseline (https://ssl-config.mozilla.org/) so that:
#   - We comply with USZoom Encryption Policy 3701 (ENC-01: TLS >= 1.2, AES-128+).
#   - SSL Labs grades remain A or higher on our public hostname.
#   - Certbot renewals do not silently downgrade our posture (this file is
#     `include`-d from the HTTPS server block; Certbot does not touch it).
#
# Install: this file is rsync'd to /etc/nginx/snippets/insighthub-tls.conf by
# ec2-deploy.sh. The HTTPS server block in /etc/nginx/sites-enabled/insighthub.conf
# must reference it via:
#     include /etc/nginx/snippets/insighthub-tls.conf;
#
# Reference / regeneration: https://ssl-config.mozilla.org/#server=nginx&version=1.24&config=intermediate&openssl=3.0
# Last reviewed: 2026-05-19 (annual review next due: 2027-05-19)

# ── Protocol pinning (policy 3701 ENC-01) ────────────────────────────────────
# TLS 1.0 and 1.1 are explicitly forbidden by policy.
# TLS 1.3 is preferred; 1.2 retained for older browser/SDK compatibility.
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher suite (Mozilla intermediate, 2025-Q4 baseline) ────────────────────
# All ciphers below provide AES-128-GCM or stronger and perfect forward secrecy
# (ECDHE/DHE key exchange). Satisfies policy 3701 ENC-01 "AES-128+".
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# Mozilla intermediate: client-preferred cipher order (TLS 1.3 negotiates this).
ssl_prefer_server_ciphers off;

# ── Session resumption ───────────────────────────────────────────────────────
# Cache TLS sessions for 1d (faster handshakes), but disable session tickets
# (they're a forward-secrecy hole if the ticket-encryption key leaks).
ssl_session_timeout 1d;
ssl_session_cache shared:InsightHubTLS:10m;
ssl_session_tickets off;

# ── OCSP stapling ────────────────────────────────────────────────────────────
# Reduces handshake latency AND avoids the client leaking the cert ID to the CA.
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# ── HSTS (policy 3701 ENC-04: enforce HTTPS) ─────────────────────────────────
# 2 years, includes subdomains, preload-eligible.
# DO NOT enable `preload` until you're certain you'll never serve plain HTTP
# on this hostname again (preload list is hard to leave).
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
