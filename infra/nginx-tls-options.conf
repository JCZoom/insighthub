# InsightHub — TLS hardening include (G-03)
#
# Purpose: Add OCSP stapling + HSTS on top of Certbot's TLS baseline so that:
#   - We comply with USZoom Encryption Policy 3701 (ENC-01 TLS≥1.2, ENC-04 HSTS).
#   - SSL Labs grades reach A+ on our public hostname.
#   - Certbot renewals do not silently downgrade our posture (this file is
#     `include`-d from the HTTPS server block; Certbot does not touch it).
#
# Why no `ssl_protocols` / `ssl_ciphers` / `ssl_session_*` directives here:
#   Certbot's nginx plugin auto-includes /etc/letsencrypt/options-ssl-nginx.conf
#   in the HTTPS server block. That file already pins TLSv1.2+TLSv1.3, the
#   Mozilla intermediate cipher list, and disables session tickets — duplicating
#   any of those directives here makes `nginx -t` fail with "directive is
#   duplicate". Verify on the host with:
#       cat /etc/letsencrypt/options-ssl-nginx.conf
#   If a future Certbot version drops those defaults, re-add them here with a
#   dated comment so the SSL Labs A+ posture is preserved.
#
# Install: this file is rsync'd to /etc/nginx/snippets/insighthub-tls.conf by
# ec2-deploy.sh. The HTTPS server block in /etc/nginx/sites-enabled/insighthub.conf
# must reference it via:
#     include /etc/nginx/snippets/insighthub-tls.conf;
#
# Reference / regeneration: https://ssl-config.mozilla.org/#server=nginx&version=1.24&config=intermediate&openssl=3.0
# Last reviewed: 2026-05-19 (annual review next due: 2027-05-19)

# ── OCSP stapling ────────────────────────────────────────────────────────────
# Reduces handshake latency AND avoids the client leaking the cert ID to the CA.
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# ── HSTS (policy 3701 ENC-04: enforce HTTPS) ─────────────────────────────────
# 2 years, includes subdomains, preload-eligible.
# DO NOT enable `preload` until you're certain you'll never serve plain HTTP
# on this hostname again (preload list is hard to leave).
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
