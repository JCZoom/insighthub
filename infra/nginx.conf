# InsightHub — Nginx reverse proxy config
# Install: sudo cp infra/nginx.conf /etc/nginx/sites-available/insighthub.conf
#          sudo cp infra/nginx-tls-options.conf /etc/nginx/snippets/insighthub-tls.conf
#          sudo ln -sf /etc/nginx/sites-available/insighthub.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# After first deploy, get SSL:
#   sudo certbot --nginx -d dashboards.jeffcoy.net
#
# After Certbot adds the HTTPS server block, add this line INSIDE the
# `server { listen 443 ssl; ... }` block:
#     include /etc/nginx/snippets/insighthub-tls.conf;
# This pins TLS protocols/ciphers/HSTS per USZoom Encryption Policy 3701 (G-03).
# Certbot will preserve the include across renewals.
#
# Verify hardening after install:
#   curl -sI https://dashboards.jeffcoy.net | grep -i strict-transport
#   nmap --script ssl-enum-ciphers -p 443 dashboards.jeffcoy.net
#   Annual: run SSL Labs scan https://www.ssllabs.com/ssltest/analyze.html?d=dashboards.jeffcoy.net
#
# Note: Certbot will modify this file to add SSL blocks.
#       The ec2-deploy.sh script preserves Certbot changes.

# Suppress nginx version in `Server:` response header.
# Reduces it from `nginx/1.24.0 (Ubuntu)` to just `nginx`. Closes
# evidence note P-02 in docs/evidence/smoke-test-2026-05-19-track-b.md.
# This file is included at http context via /etc/nginx/sites-enabled/,
# so this directive applies to all server blocks below.
server_tokens off;

# Rate limiting zone (10 req/sec per IP with burst of 20)
limit_req_zone $binary_remote_addr zone=insighthub_api:10m rate=10r/s;

# Upstream for health checks
upstream insighthub {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 80;
    server_name dashboards.jeffcoy.net;

    # Redirect HTTP → HTTPS (Certbot adds this automatically)
    # Uncomment after SSL is configured:
    # return 301 https://$host$request_uri;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://insighthub;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public assets
    location /public/ {
        proxy_pass http://insighthub;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API rate limiting
    location /api/ {
        limit_req zone=insighthub_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://insighthub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check — no rate limit
    location = /api/health {
        proxy_pass http://insighthub;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # Default — proxy to Next.js
    location / {
        proxy_pass http://insighthub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
