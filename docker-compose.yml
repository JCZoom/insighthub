# Docker Compose for InsightHub
#
# NOTE: InsightHub uses SQLite — no database container needed.
# This file exists for future use (e.g. PostgreSQL migration, Redis cache).
#
# To run InsightHub locally, just use:
#   npm install && npm run db:push && npm run dev
#
# If you need PostgreSQL in the future:
#   1. Change prisma/schema.prisma provider to "postgresql"
#   2. Uncomment the services below
#   3. Run: docker compose up -d

services: {}

